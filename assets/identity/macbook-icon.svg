<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160" role="img" aria-labelledby="title desc">
  <title id="title">MacBook Shortcuts Icon</title>
  <desc id="desc">Transparent-background icon for MacBook shortcuts and workflows.</desc>
  <defs>
    <style>
      .paper{fill:#f4fbfb}
      .teal{fill:#14aaa4}
      .blue{fill:#347fd0}
      .line{fill:none;stroke:#162636;stroke-width:8;stroke-linecap:round;stroke-linejoin:round}
      .line-blue{fill:none;stroke:#347fd0;stroke-width:8;stroke-linecap:round;stroke-linejoin:round}
      .line-teal{fill:none;stroke:#14aaa4;stroke-width:8;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>
  <rect x="20" y="20" width="120" height="120" rx="32" class="paper"/>
  <rect x="43" y="49" width="74" height="48" rx="7" class="line"/>
  <path d="M31 115h98l-12-18H43z" class="line-blue"/>
