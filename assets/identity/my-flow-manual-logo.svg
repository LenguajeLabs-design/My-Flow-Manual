<svg xmlns="http://www.w3.org/2000/svg" width="720" height="180" viewBox="0 0 720 180" role="img" aria-labelledby="title desc">
  <title id="title">My Flow Manual Logo</title>
  <desc id="desc">Horizontal transparent-background logo for My Flow Manual, a personal library of shortcut and workflow guides.</desc>
  <defs>
    <style>
      .slate{fill:#162636}
      .muted{fill:#637587}
      .paper{fill:#f4fbfb}
      .teal{fill:#14aaa4}
      .blue{fill:#347fd0}
      .line{fill:none;stroke:#162636;stroke-width:6;stroke-linecap:round;stroke-linejoin:round}
      .line-blue{fill:none;stroke:#347fd0;stroke-width:6;stroke-linecap:round;stroke-linejoin:round}
      .line-teal{fill:none;stroke:#14aaa4;stroke-width:6;stroke-linecap:round;stroke-linejoin:round}
      .word{fill:#162636;stroke:#f7fbfc;stroke-width:5;paint-order:stroke;stroke-linejoin:round}
      .sub{fill:#637587;stroke:#f7fbfc;stroke-width:3;paint-order:stroke;stroke-linejoin:round}
    </style>
  </defs>
  <g transform="translate(30 34)">
    <rect x="0" y="0" width="112" height="112" rx="28" class="paper"/>
    <path d="M39 25h40l15 15v48c0 9-7 16-16 16H39c-9 0-16-7-16-16V41c0-9 7-16 16-16z" class="line"/>
    <path d="M79 25v18h17" class="line-blue"/>
    <path d="M41 54h28c10 0 17 7 17 16s-7 16-17 16H51" class="line-blue"/>
    <path d="M52 86L40 74l12-12" class="line-blue"/>
    <path d="M41 96h33" class="line-teal"/>
    <circle cx="41" cy="54" r="6.5" class="teal"/>
    <circle cx="84" cy="96" r="6.5" class="blue"/>
  </g>
  <g transform="translate(174 54)">
    <text x="0" y="42" class="word" font-family="Inter, Avenir Next, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="46" font-weight="760" letter-spacing="0">My Flow Manual</text>
    <text x="3" y="78" class="sub" font-family="Inter, Avenir Next, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="650" letter-spacing="1.3">SHORTCUTS  /  WORKFLOWS  /  PRACTICAL GUIDES</text>
  </g>
</svg>
