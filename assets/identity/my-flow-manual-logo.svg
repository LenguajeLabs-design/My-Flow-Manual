<svg xmlns="http://www.w3.org/2000/svg" width="560" height="128" viewBox="0 0 560 128" role="img" aria-labelledby="title desc">
  <title id="title">My Flow Manual Logo</title>
  <desc id="desc">Horizontal logo for My Flow Manual with a flow-guide icon and wordmark.</desc>
  <defs>
    <style>
      .ink{fill:#172533}
      .muted{fill:#5f7082}
      .word{fill:#172533;stroke:#ffffff;stroke-width:4;paint-order:stroke;stroke-linejoin:round}
      .tag{fill:#5f7082;stroke:#ffffff;stroke-width:3;paint-order:stroke;stroke-linejoin:round}
      .blue{fill:#2f7dd3}
      .teal{fill:#10a7a5}
      .soft{fill:#e7f7f6}
      .stroke{fill:none;stroke:#172533;stroke-width:5.5;stroke-linecap:round;stroke-linejoin:round}
      .stroke-blue{fill:none;stroke:#2f7dd3;stroke-width:5.5;stroke-linecap:round;stroke-linejoin:round}
      .stroke-teal{fill:none;stroke:#10a7a5;stroke-width:5.5;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>
  <g transform="translate(26 24)">
    <rect x="0" y="0" width="80" height="80" rx="18" class="soft"/>
    <path d="M22 24h25c8 0 14 6 14 14s-6 14-14 14H33" class="stroke-blue"/>
    <path d="M33 52l-9-9 9-9" class="stroke-blue"/>
    <path d="M26 62h30" class="stroke-teal"/>
    <circle cx="22" cy="24" r="5.5" class="teal"/>
    <circle cx="61" cy="62" r="5.5" class="blue"/>
  </g>
  <g transform="translate(132 37)">
    <text x="0" y="31" class="word" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="760" letter-spacing="0">My Flow Manual</text>
    <text x="2" y="58" class="tag" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="560" letter-spacing=".6">SHORTCUTS · WORKFLOWS · PRACTICAL GUIDES</text>
  </g>
</svg>
