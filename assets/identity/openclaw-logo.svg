<svg xmlns="http://www.w3.org/2000/svg" width="420" height="128" viewBox="0 0 420 128" role="img" aria-labelledby="title desc">
  <title id="title">OpenClaw Logo</title>
  <desc id="desc">OpenClaw logo in the same visual family as My Flow Manual.</desc>
  <defs>
    <style>
      .ink{fill:#172533}
      .muted{fill:#5f7082}
      .word{fill:#172533;stroke:#ffffff;stroke-width:4;paint-order:stroke;stroke-linejoin:round}
      .tag{fill:#5f7082;stroke:#ffffff;stroke-width:3;paint-order:stroke;stroke-linejoin:round}
      .blue{fill:#2f7dd3}
      .teal{fill:#10a7a5}
      .soft{fill:#e7f7f6}
      .stroke{fill:none;stroke:#172533;stroke-width:5.5;stroke-linecap:round;stroke-linejoin:round}
      .stroke-blue{fill:none;stroke:#2f7dd3;stroke-width:5.5;stroke-linecap:round;stroke-linejoin:round}
      .stroke-teal{fill:none;stroke:#10a7a5;stroke-width:5.5;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>
  <g transform="translate(26 24)">
    <rect x="0" y="0" width="80" height="80" rx="18" class="soft"/>
    <path d="M28 54c-8-8-8-20 0-28 7-7 19-7 26 0" class="stroke-blue"/>
    <path d="M54 26c8 8 8 20 0 28-7 7-19 7-26 0" class="stroke-teal"/>
    <path d="M56 27l10-1-1 10" class="stroke-blue"/>
    <path d="M26 53l-10 1 1-10" class="stroke-teal"/>
    <circle cx="40" cy="40" r="5" class="ink"/>
  </g>
  <g transform="translate(132 39)">
    <text x="0" y="34" class="word" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="40" font-weight="760" letter-spacing="0">OpenClaw</text>
    <text x="2" y="61" class="tag" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="560" letter-spacing=".6">AUTOMATION · AGENTS · WORKFLOWS</text>
  </g>
</svg>
