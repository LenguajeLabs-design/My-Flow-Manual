<svg xmlns="http://www.w3.org/2000/svg" width="560" height="180" viewBox="0 0 560 180" role="img" aria-labelledby="title desc">
  <title id="title">OpenClaw Logo</title>
  <desc id="desc">Transparent-background OpenClaw logo designed to fit the My Flow Manual identity family.</desc>
  <defs>
    <style>
      .paper{fill:#f4fbfb}
      .teal{fill:#14aaa4}
      .blue{fill:#347fd0}
      .slate{fill:#162636}
      .muted{fill:#637587}
      .line{fill:none;stroke:#162636;stroke-width:6;stroke-linecap:round;stroke-linejoin:round}
      .line-blue{fill:none;stroke:#347fd0;stroke-width:6;stroke-linecap:round;stroke-linejoin:round}
      .line-teal{fill:none;stroke:#14aaa4;stroke-width:6;stroke-linecap:round;stroke-linejoin:round}
      .word{fill:#162636;stroke:#f7fbfc;stroke-width:5;paint-order:stroke;stroke-linejoin:round}
      .sub{fill:#637587;stroke:#f7fbfc;stroke-width:3;paint-order:stroke;stroke-linejoin:round}
    </style>
  </defs>
  <g transform="translate(30 34)">
    <rect x="0" y="0" width="112" height="112" rx="28" class="paper"/>
    <path d="M34 72c-13-14-13-34 0-47 12-12 31-12 43 0" class="line-blue"/>
    <path d="M78 25c13 14 13 34 0 47-12 12-31 12-43 0" class="line-teal"/>
    <path d="M77 25h22v22" class="line-blue"/>
    <path d="M35 72H13V50" class="line-teal"/>
    <path d="M47 86h18c10 0 18 8 18 18" class="line"/>
    <path d="M49 104c0-10 8-18 18-18h18" class="line"/>
    <circle cx="56" cy="49" r="7" class="slate"/>
  </g>
  <g transform="translate(174 56)">
    <text x="0" y="43" class="word" font-family="Inter, Avenir Next, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="48" font-weight="760" letter-spacing="0">OpenClaw</text>
    <text x="3" y="79" class="sub" font-family="Inter, Avenir Next, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="650" letter-spacing="1.3">AGENTS  /  AUTOMATION  /  WORKFLOWS</text>
  </g>
</svg>
